# Drop-in replacement for nginxinc/nginx-unprivileged's stock
# /etc/nginx/conf.d/default.conf. The base image's default config serves
# files literally with no fallback, so any client-side React Router route
# with no matching file on disk (e.g. /callback, /performance, /storage) 404s
# instead of loading index.html and letting the SPA's router take over. This
# breaks the OIDC login flow specifically: Authentik's post-login redirect
# lands the browser on /callback (a client-side-only route, not a real
# file), which 404s without this fallback, so CallbackPage never mounts and
# login never completes.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
