syntax = "proto3";
option csharp_namespace = "Iverson.Client.Contracts";
package iverson;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

// DSL-driven search. The server streams back matching results with relevance scores.
service ObjectSearchService {
    rpc Search         (SearchRequest)        returns (stream SearchResponse);
    rpc SearchSimilar  (SearchSimilarRequest) returns (stream SearchResponse);
    rpc SearchChunks   (SearchChunksRequest)  returns (stream ChunkSearchResponse);
    rpc Aggregate      (AggregateRequest)     returns (AggregateResponse);
    rpc GroupBy        (GroupByRequest)       returns (stream SearchResponse);
    rpc Pipeline       (PipelineRequest)      returns (stream SearchResponse);
}

message SearchRequest {
    string      type_name = 1;
    SearchQuery query     = 2;
    int32       page      = 3;
    int32       page_size = 4;
    string      trace_id  = 5;
    repeated string fields = 6;  // property names to include; empty = all fields
    repeated JoinSpec joins = 7;
}

message SearchQuery {
    repeated SearchClause clauses = 1;
    SearchLogic           logic   = 2;
    repeated SearchSort   sort    = 3;
}

message SearchClause {
    string            property    = 1;
    SearchOperator    operator    = 2;
    SearchValue       value       = 3;
    SearchClauseType  clause_type = 4;
}

// Typed union covering all scalar and vector values the DSL can produce.
message SearchValue {
    oneof kind {
        string              string_val  = 1;
        double              number_val  = 2;
        bool                bool_val    = 3;
        RepeatedString      string_list = 4;  // used with IN operator
        RepeatedFloat       float_list  = 5;  // used with VECTOR_SIMILAR operator
    }
}

message RepeatedString { repeated string values = 1; }
message RepeatedFloat  { repeated float  values = 1; }

message SearchSort {
    string property   = 1;
    bool   descending = 2;
}

enum SearchOperator {
    EQUALS                 = 0;
    NOT_EQUALS             = 1;
    CONTAINS               = 2;
    STARTS_WITH            = 3;
    GREATER_THAN           = 4;
    LESS_THAN              = 5;
    GREATER_THAN_OR_EQUALS = 6;
    LESS_THAN_OR_EQUALS    = 7;
    IN                     = 8;
    VECTOR_SIMILAR         = 9;
    ENDS_WITH              = 10;
}

enum SearchLogic {
    AND = 0;
    OR  = 1;
}

enum SearchClauseType {
    FILTER   = 0;
    MUST_NOT = 1;
}

message SearchResponse {
    google.protobuf.Struct data     = 1;
    float                  score    = 2;
    string                 trace_id = 3;
}

// ── Semantic (vector) search ───────────────────────────────────────────────────

// Searches by embedding similarity on a property annotated with [IversonEmbedding].
// The server embeds `query` with the same model and searches the vector index.
message SearchSimilarRequest {
    string type_name = 1;  // registered entity type
    string property  = 2;  // property with [IversonEmbedding]
    string query     = 3;  // text to embed and compare
    uint32 top_k     = 4;
    string trace_id  = 5;
}

// Searches by chunk embedding similarity on a property annotated with [IversonChunk].
// Returns individual passage chunks with the parent entity key and relevance score.
message SearchChunksRequest {
    string type_name = 1;  // registered entity type
    string property  = 2;  // property with [IversonChunk]
    string query     = 3;  // text to embed and compare
    uint32 top_k     = 4;
    string trace_id  = 5;
}

message ChunkSearchResponse {
    string parent_key  = 1;  // key of the parent entity that owns this chunk
    string chunk_text  = 2;  // the matching passage text
    float  score       = 3;
    string trace_id    = 4;
}

// ── Joins ──────────────────────────────────────────────────────────────────────

enum JoinKind {
    INNER = 0;
    LEFT  = 1;
    RIGHT = 2;
    FULL  = 3;
}

message JoinSpec {
    string   left_type   = 1;  // registered Iverson type name for the left table
    string   right_type  = 2;  // registered Iverson type name for the right table
    string   left_field  = 3;  // field on left type used in the ON condition
    string   right_field = 4;  // field on right type used in the ON condition
    JoinKind kind        = 5;
}

// ── Aggregations ───────────────────────────────────────────────────────────────

message AggregateRequest {
    string      type_name    = 1;
    SearchQuery query        = 2;  // optional filter applied before aggregating
    repeated AggregationSpec aggregations = 3;
    string      trace_id     = 4;
    SearchQuery having       = 5;  // applied after GROUP BY; clauses reference aliased output columns
    reserved 6;                    // never assigned; not a removed field, just a numbering gap
    repeated JoinSpec joins  = 7;
}

message AggregateResponse {
    repeated AggregationResult results  = 1;
    int64                      total    = 2;  // total matching docs
    string                     trace_id = 3;
}

// Specifies one aggregation to run.
message AggregationSpec {
    string          name              = 1;  // result key — must be unique within the request
    AggregationType type              = 2;
    string          field             = 3;  // field to aggregate on

    // TERMS options
    int32           size              = 4;  // max buckets (default 10)

    // DATE_HISTOGRAM options
    string          calendar_interval = 5;  // "minute"|"hour"|"day"|"week"|"month"|"quarter"|"year"
    string          time_zone         = 6;  // IANA tz, e.g. "America/New_York" (default UTC)

    // RANGE options
    repeated RangeBucket range_buckets = 7;

    repeated string group_by_fields = 8;   // multi-key GROUP BY; overrides field for TERMS if set
    string          expression      = 9;   // raw SQL expr in aggregate fn; overrides field if set
}

message RangeBucket {
    string                      key  = 1;  // optional label for the bucket
    google.protobuf.DoubleValue from = 2;  // null = unbounded lower
    google.protobuf.DoubleValue to   = 3;  // null = unbounded upper
}

message AggregationResult {
    string          name         = 1;
    AggregationType type         = 2;
    repeated AggregationBucket buckets      = 3;  // TERMS / DATE_HISTOGRAM / RANGE
    double          metric_value = 4;              // AVG / SUM / MIN / MAX / COUNT
}

message AggregationBucket {
    string key   = 1;
    int64  count = 2;
}

enum AggregationType {
    TERMS          = 0;
    DATE_HISTOGRAM = 1;
    RANGE          = 2;
    AVG            = 3;
    SUM            = 4;
    MIN            = 5;
    MAX            = 6;
    COUNT          = 7;
}

// ── Compound GROUP BY ────────────────────────────────────────────────────────
//
// Runs multiple metrics over the same GROUP BY in a single SQL round-trip
// (e.g. TPC-H Q1: several SUM/AVG/COUNT columns, grouped by 2 keys, ordered,
// HAVING-filtered). Unlike AggregateRequest (one SQL query per AggregationSpec),
// GroupByRequest emits one compound SELECT with all metrics as columns.

message MetricSpec {
    string          name       = 1;  // SELECT alias
    AggregationType type       = 2;  // AVG | SUM | MIN | MAX | COUNT
    string          field      = 3;  // bare column name (used when expression is empty)
    string          expression = 4;  // raw SQL expr overrides field (e.g. "price * (1 - discount)")
}

// COUNT with both field and expression empty means COUNT(*) — no field or expression needed.

message GroupByRequest {
    string              type_name = 1;
    SearchQuery         query     = 2;   // WHERE filter
    repeated string     keys      = 3;   // GROUP BY columns (qualified with TypeName. for joins)
    repeated MetricSpec metrics   = 4;
    SearchQuery         having    = 5;   // HAVING filter; clause.property = output alias
    repeated SearchSort order_by  = 6;
    int32               limit     = 7;   // default 10000
    repeated JoinSpec   joins     = 8;
    string              trace_id  = 9;
}

// ── Pipeline (CTE chains) ────────────────────────────────────────────────────
//
// Compiles a chain of named, SQL-shaped steps into ONE StarRocks query built
// from chained CTEs (WITH name AS (...)). Each step reads the previous step by
// default, or any earlier named step via `reads`, and may join prior steps'
// CTEs or registered entity tables. Rows stream back as SearchResponse with a
// constant score of 1.0, exactly like GroupBy.

message PipelineRequest {
    string                type_name  = 1;
    repeated SearchClause base_where = 2;   // WHERE on the implicit "base" step
    SearchLogic           base_logic = 3;
    repeated PipelineStep steps      = 4;
    repeated SearchSort   order_by   = 5;   // final ORDER BY (last step's columns/aliases)
    int32                 limit      = 6;   // 0 = default 10000
    string                trace_id   = 7;
}

message PipelineStep {
    string                  name        = 1;  // CTE name; required, unique, valid identifier
    string                  reads       = 2;  // input step name; empty = previous step
    repeated SearchClause   where       = 3;
    SearchLogic             where_logic = 4;
    repeated WindowFunction windows     = 5;  // XOR with group_by/metrics/having
    repeated GroupKey       group_by    = 6;
    repeated MetricSpec     metrics     = 7;  // reuses existing MetricSpec
    repeated SearchClause   having      = 8;  // property = metric alias from this step
    repeated DeriveColumn   derive      = 9;
    repeated PipelineJoin   joins       = 10;
    repeated SelectItem     select      = 11; // required when joins present; else optional
}

message PipelineJoin {
    string   source = 1;              // prior step name OR registered type name
    JoinKind kind   = 2;              // reuses existing enum
    repeated JoinCondition on = 3;    // equality pairs, AND-ed
}

message JoinCondition {
    string left  = 1;  // column in the step's input
    string right = 2;  // column in the join source
}

message SelectItem {
    string source = 1;  // step name or type name; empty = the step's input
    string column = 2;  // empty when all = true
    bool   all    = 3;  // emit source.* (expands the source's full column set)
    string alias  = 4;  // optional output alias for a single column
}

message GroupKey {
    string    field      = 1;
    DateTrunc date_trunc = 2;  // NONE = group by the raw column
}

message DeriveColumn {
    string alias = 1;
    string expr  = 2;  // validated scalar expression over input columns / step aliases
}

message WindowFunction {
    string             alias        = 1;
    WindowFunctionKind kind         = 2;
    string             field        = 3;  // source column (empty for ROW_NUMBER/RANK/DENSE_RANK)
    string             partition_by = 4;  // optional
    string             order_by     = 5;  // required for every kind
    bool               descending   = 6;
    int32              offset       = 7;  // LAG/LEAD only; 0 = default 1
}

enum WindowFunctionKind {
    ROW_NUMBER  = 0;
    RANK        = 1;
    DENSE_RANK  = 2;
    RUNNING_SUM = 3;
    RUNNING_AVG = 4;
    LAG         = 5;
    LEAD        = 6;
}

enum DateTrunc {
    NONE    = 0;
    MINUTE  = 1;
    HOUR    = 2;
    DAY     = 3;
    WEEK    = 4;
    MONTH   = 5;
    QUARTER = 6;
    YEAR    = 7;
}
