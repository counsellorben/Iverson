# kind local profile — laptop-sized resources, kind's built-in StorageClass,
# ingress-nginx instead of a cloud LB controller.
#
# tlsSecretName is intentionally left empty here: local dev has no
# cert-manager/ACME issuer, so the api Ingress renders without a tls: block
# and is reached over plain HTTP at https://iverson.local — acceptable only
# because this profile never leaves localhost. Every cloud overlay in the
# companion Terraform plan sets a real tlsSecretName.

postgres:
  instances: 1
  storageSize: 2Gi
  storageClassName: "standard"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "1Gi" }

kafka:
  replicas: 1
  storageSize: 1Gi
  storageClassName: "standard"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "1Gi" }

starrocks:
  storageClassName: "standard"
  fe:
    replicas: 1
    storageSize: 1Gi
    resources:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "500m", memory: "1Gi" }
  be:
    replicas: 1
    storageSize: 2Gi
    resources:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "500m", memory: "1Gi" }

qdrant:
  replicas: 1
  storageSize: 1Gi
  storageClassName: "standard"
  resources:
    requests: { cpu: "250m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "1Gi" }

ollama:
  replicas: 1
  storageSize: 2Gi
  storageClassName: "standard"
  resources:
    requests: { cpu: "250m", memory: "1Gi" }
    limits: { cpu: "500m", memory: "2Gi" }

api:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  hpa:
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilization: 70
  ingress:
    className: "nginx"
    annotations: {}
    host: "iverson.local"
    tlsSecretName: ""

worker:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  hpa:
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilization: 70

jaeger:
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
