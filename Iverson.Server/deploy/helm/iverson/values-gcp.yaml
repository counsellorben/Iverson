# GCP GKE overlay — StorageClass names and node-pool labels match modules/operators
# and modules/cluster-gcp's fixed naming exactly (see Tasks 2 and 5 of this plan).
# No separate ingress controller to install — GKE's built-in GCE ingress class is used directly.

postgres:
  storageClassName: "iverson-postgres"
  nodeSelector:
    iverson.io/node-pool: postgres

kafka:
  storageClassName: "iverson-kafka"
  nodeSelector:
    iverson.io/node-pool: kafka

starrocks:
  storageClassName: "iverson-starrocks"
  fe:
    nodeSelector:
      iverson.io/node-pool: starrocks-fe
  be:
    nodeSelector:
      iverson.io/node-pool: starrocks-be

qdrant:
  storageClassName: "iverson-qdrant"
  nodeSelector:
    iverson.io/node-pool: qdrant

ollama:
  storageClassName: "iverson-ollama"
  nodeSelector:
    iverson.io/node-pool: ollama

api:
  ingress:
    className: "gce"
    annotations: {}
    host: "iverson.example.com"
    # GCE ingress terminates TLS from a standard Kubernetes Secret
    # referenced via the Ingress's tls: block, same as Azure above — replace
    # with a real cert-manager-issued Secret name for the real host before
    # applying.
    tlsSecretName: "iverson-api-tls"

jaeger:
  nodeSelector: {}
