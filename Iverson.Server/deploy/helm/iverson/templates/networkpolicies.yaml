metadata:
  name: {{ .Release.Name }}-qdrant-ingress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-qdrant }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
      ports: [{ protocol: TCP, port: 6334 }]
    - from: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-qdrant } } }]   # Raft peers
      ports: [{ protocol: TCP, port: 6335 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-qdrant-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-qdrant }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-qdrant } } }]   # Raft peers
      ports: [{ protocol: TCP, port: 6335 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ollama-ingress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-ollama }
