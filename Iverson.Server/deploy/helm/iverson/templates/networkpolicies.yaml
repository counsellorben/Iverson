---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ollama-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-ollama }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: []   # model registry (registry.ollama.ai): the pull-model init container fetches
               # nomic-embed-text from there on every start — same external-pull need as
               # docker-compose's ollama-init container. No portable pod/namespaceSelector
               # target exists for an external registry.
      ports: [{ protocol: TCP, port: 443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-jaeger-ingress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-jaeger }
