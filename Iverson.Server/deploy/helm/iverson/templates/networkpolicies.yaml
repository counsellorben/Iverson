{{- if .Values.networkPolicy.enabled }}
# Default-deny: nothing in the namespace can talk to anything else unless a
# more specific policy below explicitly allows it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-default-deny
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
---
# api is the only component allowed in from outside the namespace (via
# ingress-nginx), and the only component allowed to reach every datastore.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-api-ingress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-api }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: ingress-nginx }
      ports:
        - { protocol: TCP, port: 8080 }
    - from: []   # kubelet readiness/liveness probes: the kubelet connects directly from the
               # node, not from any pod/namespace, so there's no podSelector/namespaceSelector
               # to scope this to — same any-source reasoning as the port-only egress rules
               # elsewhere in this file. Scoped to the dedicated Http1 health port only.
      ports:
        - { protocol: TCP, port: 8081 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-api-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-api }
  policyTypes: ["Egress"]
  egress:
    - to: [{ podSelector: { matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres } } }]
      ports: [{ protocol: TCP, port: 5432 }]
    - to: [{ podSelector: { matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka } } }]
      ports: [{ protocol: TCP, port: 9093 }]
    - to: [{ podSelector: { matchLabels: { app.starrocks.ownerreference/name: {{ .Release.Name }}-starrocks-fe } } }]
               # clients only ever talk to FE's query port, never BE directly — see the
               # starrocks-egress/-ingress note below on why this isn't app.starrocks.io/cluster.
      ports: [{ protocol: TCP, port: 9030 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-qdrant } } }]
      ports: [{ protocol: TCP, port: 6334 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-ollama } } }]
      ports: [{ protocol: TCP, port: 11434 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-jaeger } } }]
      ports: [{ protocol: TCP, port: 4317 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-authentik-server } } }]
      ports: [{ protocol: TCP, port: 9000 }]
    - to: []   # DNS — every egress policy needs this or in-cluster name resolution breaks
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
---
# worker is the Kafka-consumer/background-processing counterpart to api (same image,
# WORKLOAD_ROLE=worker) — it needs the same datastore/backing-service egress as api,
# minus the ingress-nginx/health-probe ingress rules (it serves no inbound client
# traffic, so the default-deny above already covers it correctly with no ingress
# policy of its own).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-worker-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-worker }
  policyTypes: ["Egress"]
  egress:
    - to: [{ podSelector: { matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres } } }]
      ports: [{ protocol: TCP, port: 5432 }]
    - to: [{ podSelector: { matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka } } }]
      ports: [{ protocol: TCP, port: 9093 }]
    - to: [{ podSelector: { matchLabels: { app.starrocks.ownerreference/name: {{ .Release.Name }}-starrocks-fe } } }]
      ports: [{ protocol: TCP, port: 9030 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-qdrant } } }]
      ports: [{ protocol: TCP, port: 6334 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-ollama } } }]
      ports: [{ protocol: TCP, port: 11434 }]
    - to: [{ podSelector: { matchLabels: { app: {{ .Release.Name }}-jaeger } } }]
      ports: [{ protocol: TCP, port: 4317 }]
    - to: []   # DNS — every egress policy needs this or in-cluster name resolution breaks
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-worker-ingress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-worker }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-prometheus } }
      ports: [{ protocol: TCP, port: 8081 }]
---
# Every datastore/backing-service component: ingress only from api (and, where noted,
# worker), on its own port. None of them need to initiate egress beyond DNS + their own
# operator/peer traffic, which the operator's own NetworkPolicy (if any) or
# a component-specific rule below already covers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-postgres-ingress
  annotations:
    # postgres is a CloudNativePG-operator-managed CR; kube-score can't see the
    # runtime pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  podSelector:
    matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-authentik-server } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-authentik-worker } }
        - podSelector: { matchLabels: { job-name: {{ .Release.Name }}-authentik-revoke-cross-db } }
               # the revoke-cross-db job's own egress rule (below) already allows it to *send*
               # to postgres on 5432, but that's only half of a NetworkPolicy: without a
               # matching ingress rule here too, postgres never accepts the connection — same
               # asymmetry as the starrocks create-user job's ingress/egress pairing.
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-postgres-egress
  annotations:
    # postgres is a CloudNativePG-operator-managed CR; kube-score can't see the
    # runtime pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  podSelector:
    matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres } } }]   # streaming replication
      ports: [{ protocol: TCP, port: 5432 }]
    - to: []   # Kubernetes API server: CNPG's own initdb/bootstrap job (baked into the
               # postgres image, not a sidecar) calls back to the API server directly to
               # sync Cluster status — without this it times out forever and the Cluster
               # never leaves "Setting up primary". No portable way to scope this tighter:
               # the API server isn't a normal in-namespace pod, and its address/CIDR
               # differs across kind/EKS/AKS/GKE (managed control planes aren't even
               # in-cluster pods), so this can't be a podSelector/namespaceSelector rule.
               # Both 443 and 6443 are listed because NetworkPolicy enforcement happens
               # after kube-proxy's Service DNAT rewrites the destination port: the
               # `kubernetes` Service is always :443, but self-hosted/kubeadm-style
               # control planes (kind included) back it with the apiserver's real port,
               # 6443 — a rule scoped to 443 alone silently never matches that traffic.
               # Managed control planes (EKS/AKS/GKE) commonly proxy straight through on
               # 443 with no rewrite, so both must stay allowed.
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-kafka-ingress
  annotations:
    # kafka is a Strimzi-operator-managed CR; kube-score can't see the runtime
    # pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  podSelector:
    matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka }
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
               # worker reuses api's own KafkaUser/SASL credentials (see
               # charts/worker/templates/deployment.yaml's Kafka__SaslUsername) rather than a
               # separate KafkaUser, but NetworkPolicy enforcement is pure L3/L4 pod-label
               # matching — it has no visibility into the SASL layer above it. The Kafka CR
               # (charts/kafka/templates/kafka.yaml) doesn't set the listener's
               # networkPolicyPeers either, so this policy is the only enforcement point;
               # without this entry worker's TCP SYN to the broker never gets past the
               # network policy regardless of having valid credentials.
      ports: [{ protocol: TCP, port: 9093 }]
    - from: [{ podSelector: { matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka } } }]   # broker/controller peers
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-kafka-egress
  annotations:
    # kafka is a Strimzi-operator-managed CR; kube-score can't see the runtime
    # pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  podSelector:
    matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { strimzi.io/cluster: {{ .Release.Name }}-kafka } } }]   # broker/controller peers
               # 9093 (tcp-clientstls, external/API traffic) alone isn't enough: the
               # entity-operator (Topic/User operators, also selected by this same
               # strimzi.io/cluster label) talks to the bootstrap service's
               # tcp-replication listener on 9091 to fetch cluster metadata — without it,
               # its AdminClient never gets past "Timed out waiting to send the call".
      ports: [{ protocol: TCP, port: 9091 }, { protocol: TCP, port: 9093 }]
    - to: []   # Kubernetes API server: the broker process resolves ${strimziSecretName:...}
               # config placeholders (e.g. iverson-kafka-trustbundle) via Strimzi's
               # KubernetesSecretConfigProvider, which calls the API server directly at
               # startup — without this it times out and the broker crash-loops before it
               # ever gets to storage format/listener startup. Same 443+6443 reasoning as
               # the postgres-egress rule above: the `kubernetes` Service is :443, but
               # self-hosted/kubeadm control planes (kind included) back it on :6443 because
               # NetworkPolicy enforcement runs after kube-proxy's Service DNAT rewrites the
               # destination port.
      ports: [{ protocol: TCP, port: 443 }, { protocol: TCP, port: 6443 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-starrocks-ingress
  annotations:
    # starrocks is a StarRocks-operator-managed CR; kube-score can't see the
    # runtime pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  # The operator never applies an `app.starrocks.io/cluster` label to the FE/BE pods it
  # creates — its real runtime labels are `app.starrocks.ownerreference/name: <cr>-fe|be` and
  # `app.kubernetes.io/component: fe|be` (confirmed against the operator's own
  # pkg/k8sutils/load/metadata.go, same source used for the FE/BE PodDisruptionBudget
  # selectors). A podSelector on app.starrocks.io/cluster matches zero real pods — this whole
  # policy silently never applied to FE or BE. matchExpressions/In is required since FE and BE
  # have different ownerreference/name values and there's no single label shared by both.
  podSelector:
    matchExpressions:
      - key: app.starrocks.ownerreference/name
        operator: In
        values: ["{{ .Release.Name }}-starrocks-fe", "{{ .Release.Name }}-starrocks-be"]
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
        - podSelector: { matchLabels: { job-name: {{ .Release.Name }}-starrocks-create-user } }
               # the create-user job's own egress rule already allows it to *send* to FE on
               # 9030, but that's only half of a NetworkPolicy: without a matching ingress
               # rule here too, FE never accepts the connection — same asymmetry as the
               # postgres ingress/egress pairing above. Missing this caused mysql's TCP
               # connect to FE to time out (errno 110) instead of erroring cleanly, which
               # the job's own `2>/dev/null` then hid as an infinite "waiting for FE...".
      ports: [{ protocol: TCP, port: 9030 }]
    - from:   # FE/BE peers
        - podSelector:
            matchExpressions:
              - key: app.starrocks.ownerreference/name
                operator: In
                values: ["{{ .Release.Name }}-starrocks-fe", "{{ .Release.Name }}-starrocks-be"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-starrocks-egress
  annotations:
    # starrocks is a StarRocks-operator-managed CR; kube-score can't see the
    # runtime pod labels the operator applies, so it can't match this policy's
    # podSelector to any pod it renders — confirmed false positive.
    kube-score/ignore: networkpolicy-targets-pod
spec:
  # See the matching comment on starrocks-ingress: app.starrocks.io/cluster matches no real
  # pod, the operator's actual label is app.starrocks.ownerreference/name: <cr>-fe|be.
  podSelector:
    matchExpressions:
      - key: app.starrocks.ownerreference/name
        operator: In
        values: ["{{ .Release.Name }}-starrocks-fe", "{{ .Release.Name }}-starrocks-be"]
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to:   # FE/BE peers
        - podSelector:
            matchExpressions:
              - key: app.starrocks.ownerreference/name
                operator: In
                values: ["{{ .Release.Name }}-starrocks-fe", "{{ .Release.Name }}-starrocks-be"]
               # 9030 (query, MySQL protocol) alone isn't enough: BE registers itself with FE
               # over FE's rpc_port (9020), and edit_log (9010)/http (8030) plus BE's own
               # http/brpc/heartbeat ports (8040/8060/9050/9060) are used for FE<->BE and
               # BE<->BE coordination. Missing 9020 specifically caused BE's "Add myself into
               # FE" registration call to silently time out and crash-loop.
      ports:
        - { protocol: TCP, port: 8030 }
        - { protocol: TCP, port: 9010 }
        - { protocol: TCP, port: 9020 }
        - { protocol: TCP, port: 9030 }
        - { protocol: TCP, port: 8040 }
        - { protocol: TCP, port: 8060 }
        - { protocol: TCP, port: 9050 }
        - { protocol: TCP, port: 9060 }
---
# The post-install/post-upgrade create-user Job (charts/starrocks/templates/job-create-user.yaml)
# runs as a plain Job pod, not part of the StarRocksCluster CR — it only carries `job-name`,
# not `app.starrocks.io/cluster`, so none of the policies above cover it. Under default-deny that
# means zero egress, including DNS, so its `mysql -h <fe-service>` wait loop never resolves the
# hostname and spins forever ("waiting for FE..." with no useful error, since the script
# redirects mysql's stderr to /dev/null).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-starrocks-create-user-egress
spec:
  podSelector:
    matchLabels: { job-name: {{ .Release.Name }}-starrocks-create-user }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { app.starrocks.ownerreference/name: {{ .Release.Name }}-starrocks-fe } } }]
               # the create-user job's `mysql -h <fe-service>` call only ever reaches FE, never
               # BE — see the starrocks-egress note above on app.starrocks.io/cluster vs the
               # operator's real app.starrocks.ownerreference/name label.
      ports: [{ protocol: TCP, port: 9030 }]
---
# The post-install/post-upgrade revoke-cross-db Job
# (charts/authentik/templates/job-revoke-cross-db.yaml) runs as a plain Job pod, not part of
# the postgres CNPG Cluster CR — it only carries `job-name`, not `cnpg.io/cluster`, so none of
# the policies above cover it. Under default-deny that means zero egress, including DNS, so
# its `psql`-based wait loop never resolves the `<release>-postgres-rw` hostname and spins
# forever ("waiting for authentik role to exist..." with no useful error, since the script
# redirects psql's stderr to /dev/null) — same failure mode as the starrocks create-user job
# above, before its own dedicated egress rule was added.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-authentik-revoke-cross-db-egress
spec:
  podSelector:
    matchLabels: { job-name: {{ .Release.Name }}-authentik-revoke-cross-db }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to: [{ podSelector: { matchLabels: { cnpg.io/cluster: {{ .Release.Name }}-postgres } } }]
      ports: [{ protocol: TCP, port: 5432 }]
---
apiVersion: networking.k8s.io/v1
