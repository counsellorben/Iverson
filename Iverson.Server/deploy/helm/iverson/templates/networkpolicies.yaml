  ingress:
    - from:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
      ports: [{ protocol: TCP, port: 4317 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-jaeger-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-jaeger }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-prometheus-egress
spec:
  podSelector:
    matchLabels: { app: {{ .Release.Name }}-prometheus }
  policyTypes: ["Egress"]
  egress:
    - to: []   # DNS
      ports: [{ protocol: UDP, port: 53 }, { protocol: TCP, port: 53 }]
    - to:
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-api } }
        - podSelector: { matchLabels: { app: {{ .Release.Name }}-worker } }
