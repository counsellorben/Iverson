# Azure AKS overlay — StorageClass names and node-pool labels match modules/operators
# and modules/cluster-azure's fixed naming exactly (see Tasks 2 and 4 of this plan).

postgres:
  storageClassName: "iverson-postgres"
  nodeSelector:
    iverson.io/node-pool: postgres
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "postgres"
      effect: "NoSchedule"

kafka:
  storageClassName: "iverson-kafka"
  nodeSelector:
    iverson.io/node-pool: kafka
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "kafka"
      effect: "NoSchedule"

starrocks:
  storageClassName: "iverson-starrocks"
  fe:
    replicas: 3
    nodeSelector:
      iverson.io/node-pool: starrocks-fe
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-fe"
        effect: "NoSchedule"
  be:
    nodeSelector:
      iverson.io/node-pool: starrocks-be
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-be"
        effect: "NoSchedule"

qdrant:
  storageClassName: "iverson-qdrant"
  nodeSelector:
    iverson.io/node-pool: qdrant
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "qdrant"
      effect: "NoSchedule"

ollama:
  storageClassName: "iverson-ollama"
  nodeSelector:
    iverson.io/node-pool: ollama
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "ollama"
      effect: "NoSchedule"

api:
  ingress:
    className: "azure-application-gateway"
    annotations: {}
    host: "iverson.example.com"
    # AGIC terminates TLS from a standard Kubernetes Secret referenced via
    # the Ingress's tls: block (the api subchart's Ingress template already
    # renders one whenever tlsSecretName is set) — replace with a real
    # cert-manager-issued Secret name for the real host before applying.
    tlsSecretName: "iverson-api-tls"

# No worker: overlay here on purpose. The api subchart's only cloud-specific override
# in this file is its Ingress (AGIC class/tlsSecretName above); the worker subchart has
# no Ingress and, like api, isn't wired to a dedicated node pool (compare postgres/kafka/
# starrocks/qdrant/ollama above, which do get one). Its resources/hpa come from the
# cloud-agnostic worker: block in values.yaml, same as api's do.

jaeger:
  nodeSelector: {}
