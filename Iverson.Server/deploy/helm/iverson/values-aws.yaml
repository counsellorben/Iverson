# AWS EKS overlay — StorageClass names and node-pool labels match modules/operators
# and modules/cluster-aws's fixed naming exactly (see Tasks 2 and 3 of this plan).

# Keep in lockstep with api.ingress.host below — see values.yaml's global.ingressHost
# comment for why this is a separate key instead of a single source of truth.
global:
  ingressHost: "iverson.example.com"

postgres:
  storageClassName: "iverson-postgres"
  nodeSelector:
    iverson.io/node-pool: postgres
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "postgres"
      effect: "NoSchedule"

kafka:
  storageClassName: "iverson-kafka"
  nodeSelector:
    iverson.io/node-pool: kafka
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "kafka"
      effect: "NoSchedule"

starrocks:
  storageClassName: "iverson-starrocks"
  fe:
    replicas: 3
    nodeSelector:
      iverson.io/node-pool: starrocks-fe
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-fe"
        effect: "NoSchedule"
  be:
    nodeSelector:
      iverson.io/node-pool: starrocks-be
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-be"
        effect: "NoSchedule"

qdrant:
  storageClassName: "iverson-qdrant"
  nodeSelector:
    iverson.io/node-pool: qdrant
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "qdrant"
      effect: "NoSchedule"

ollama:
  storageClassName: "iverson-ollama"
  nodeSelector:
    iverson.io/node-pool: ollama
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "ollama"
      effect: "NoSchedule"

api:
  ingress:
    className: "alb"
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/backend-protocol-version: GRPC
      # ALB terminates TLS using an ACM certificate referenced by ARN, not a
      # Kubernetes Secret — tlsSecretName stays empty here on purpose (the
      # Ingress template's tls: block is for Secret-based termination, which
      # ALB doesn't use). Replace <ACM_CERT_ARN> with a real certificate
      # provisioned for the real host before applying — without it ALB will
      # only serve HTTP.
      alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERT_ARN>"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
    host: "iverson.example.com"

# worker/prometheus/redis/authentik: none of these get a dedicated node pool in
# modules/cluster-aws (only postgres/kafka/starrocks/qdrant/ollama do — confirmed
# against the Terraform node-pool map) — they land on the untainted "general" pool,
# same as api. Their resources below are unchanged from values.yaml's cloud-agnostic
# defaults; restated explicitly here (rather than left to silent inheritance) so this
# file is self-documenting and matches values-local.yaml's shape. Only authentik's
# bootstrapEmail actually differs from base, to match this environment's real host.
worker:
  replicas: 2
  resources:
    requests: { cpu: "2", memory: "4Gi", ephemeral-storage: "1Gi" }
    limits: { cpu: "2", memory: "4Gi", ephemeral-storage: "2Gi" }
  hpa:
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilization: 70

prometheus:
  imageTag: "v2.55.1"
  storageSize: "20Gi"
  storageClassName: ""
  resources:
    requests: { cpu: "250m", memory: "512Mi", ephemeral-storage: "512Mi" }
    limits: { cpu: "500m", memory: "1Gi", ephemeral-storage: "1Gi" }
  nodeSelector: {}

redis:
  imageTag: "7.4-alpine"
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "250m", memory: "256Mi" }
  nodeSelector: {}

authentik:
  imageTag: "2026.5.3"
  resources:
    server:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "500m", memory: "1Gi" }
    worker:
      requests: { cpu: "250m", memory: "512Mi" }
      limits: { cpu: "500m", memory: "1Gi" }
  nodeSelector: {}
  bootstrapEmail: "admin@iverson.example.com"
  ingress:
    className: "alb"
    annotations:
      # ALB terminates TLS using an ACM certificate referenced by ARN, not a
      # Kubernetes Secret — tlsSecretName stays empty (chart default) same as
      # api.ingress above. Replace <ACM_CERT_ARN> with a real certificate
      # provisioned for the real host before applying — without it ALB will
      # only serve HTTP.
      alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERT_ARN>"

adminUi:
  oidcAuthority: "http://authentik.iverson.example.com/application/o/iverson-api/"
  apiBaseUrl: "https://iverson.example.com"
  ingress:
    className: "alb"
    annotations:
      # ALB terminates TLS using an ACM certificate referenced by ARN, not a
      # Kubernetes Secret — tlsSecretName stays empty (chart default) same as
      # api.ingress/authentik.ingress above. Replace <ACM_CERT_ARN> with a real
      # certificate provisioned for the real host before applying — without it
      # ALB will only serve HTTP.
      alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERT_ARN>"

jaeger:
  nodeSelector: {}
