# AWS EKS overlay — StorageClass names and node-pool labels match modules/operators
# and modules/cluster-aws's fixed naming exactly (see Tasks 2 and 3 of this plan).

postgres:
  storageClassName: "iverson-postgres"
  nodeSelector:
    iverson.io/node-pool: postgres
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "postgres"
      effect: "NoSchedule"

kafka:
  storageClassName: "iverson-kafka"
  nodeSelector:
    iverson.io/node-pool: kafka
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "kafka"
      effect: "NoSchedule"

starrocks:
  storageClassName: "iverson-starrocks"
  fe:
    replicas: 3
    nodeSelector:
      iverson.io/node-pool: starrocks-fe
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-fe"
        effect: "NoSchedule"
  be:
    nodeSelector:
      iverson.io/node-pool: starrocks-be
    tolerations:
      - key: "iverson.io/node-pool"
        operator: "Equal"
        value: "starrocks-be"
        effect: "NoSchedule"

qdrant:
  storageClassName: "iverson-qdrant"
  nodeSelector:
    iverson.io/node-pool: qdrant
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "qdrant"
      effect: "NoSchedule"

ollama:
  storageClassName: "iverson-ollama"
  nodeSelector:
    iverson.io/node-pool: ollama
  tolerations:
    - key: "iverson.io/node-pool"
      operator: "Equal"
      value: "ollama"
      effect: "NoSchedule"

api:
  ingress:
    className: "alb"
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/backend-protocol-version: GRPC
      # ALB terminates TLS using an ACM certificate referenced by ARN, not a
      # Kubernetes Secret — tlsSecretName stays empty here on purpose (the
      # Ingress template's tls: block is for Secret-based termination, which
      # ALB doesn't use). Replace <ACM_CERT_ARN> with a real certificate
      # provisioned for the real host before applying — without it ALB will
      # only serve HTTP.
      alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERT_ARN>"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}, {"HTTP":80}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
    host: "iverson.example.com"

# No worker: overlay here on purpose. The api subchart's only cloud-specific override
# in this file is its Ingress (ALB annotations/class above); the worker subchart has no
# Ingress and, like api, isn't wired to a dedicated node pool (compare postgres/kafka/
# starrocks/qdrant/ollama above, which do get one). Its resources/hpa come from the
# cloud-agnostic worker: block in values.yaml, same as api's do.

jaeger:
  nodeSelector: {}
