{{- $loadtest := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-loadtest-client" .Release.Name) }}
{{- $webtest := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-webtest-client" .Release.Name) }}
{{- $adminAuto := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-admin-automation-client" .Release.Name) }}
{{- $humanOidc := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-human-oidc-client" .Release.Name) }}
{{- $loadtestHuman := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-loadtest-human-client" .Release.Name) }}
{{- $smokeTestUser := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-smoke-test-user" .Release.Name) }}
{{- $bypassUser := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-bypass-user" .Release.Name) }}
{{- $adminOrchestratorUser := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-admin-orchestrator-user" .Release.Name) }}
{{- $adminOrchestratorToken := lookup "v1" "Secret" .Release.Namespace (printf "%s-authentik-admin-orchestrator-token" .Release.Name) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-authentik-blueprints-service-clients
data:
  service-clients.yaml: |
    version: 1
    metadata:
      name: Service/automation OAuth2 clients and full human-provider definition
    entries:
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: admin
        attrs:
          name: "Iverson: admin operator scope"
          description: Grants operator-tier access to Iverson's admin endpoints
          expression: "return {}"
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: schema_admin
        attrs:
          name: "Iverson: schema admin scope"
          description: Grants rights to register/redefine entity schemas
          expression: "return {}"
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: groups
        attrs:
          name: "Iverson: group membership"
          description: Exposes the authenticated user's Authentik group names
          expression: "return [group.name for group in user.ak_groups.all()]"
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: tenant_id
        attrs:
          name: "Iverson: tenant id"
          description: The caller's tenant identifier for data isolation
          expression: 'return {"tenant_id": request.user.attributes.get("tenant_id")}'
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: tenant_id_loadtest
        attrs:
          name: "Iverson: loadtest tenant id"
          description: Fixed tenant identifier issued to the loadtest service client
          expression: 'return {"tenant_id": "tenant-loadtest"}'
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: tenant_id_webtest
        attrs:
          name: "Iverson: webtest tenant id"
          description: Fixed tenant identifier issued to the webtest service client
          expression: 'return {"tenant_id": "tenant-webtest"}'
      - model: authentik_providers_oauth2.scopemapping
        identifiers:
          scope_name: tenant_id_admin
        attrs:
          name: "Iverson: admin automation tenant id"
          description: Fixed tenant identifier issued to the admin-automation service client
          expression: 'return {"tenant_id": "tenant-admin"}'
{{- range $name := list "loadtest" "webtest" "admin-automation" }}
{{- $secret := index (dict "loadtest" $loadtest "webtest" $webtest "admin-automation" $adminAuto) $name }}
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: iverson-{{ $name }}
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: confidential
          client_id: {{ if $secret }}{{ index $secret.data "client-id" | b64dec }}{{ else }}{{ randAlphaNum 40 }}{{ end }}
          client_secret: {{ if $secret }}{{ index $secret.data "client-secret" | b64dec }}{{ else }}{{ randAlphaNum 50 }}{{ end }}
          redirect_uris: []
          grant_types: ["client_credentials"]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          issuer_mode: global
{{- if eq $name "admin-automation" }}
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, admin]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, schema_admin]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, tenant_id_admin]]
{{- else if eq $name "loadtest" }}
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, schema_admin]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, tenant_id_loadtest]]
{{- else if eq $name "webtest" }}
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, tenant_id_webtest]]
{{- end }}
      - model: authentik_core.application
        identifiers:
          slug: iverson-{{ $name }}
        attrs:
          name: iverson-{{ $name }}
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, iverson-{{ $name }}]]
{{- end }}
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: iverson-oidc-default
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: public
          redirect_uris:
            - matching_mode: strict
              url: "http://{{ .Values.global.ingressHost }}/admin/callback"
              redirect_uri_type: authorization
            - matching_mode: strict
              url: "http://localhost:5173/callback"
              redirect_uri_type: authorization
          client_id: {{ if $humanOidc }}{{ index $humanOidc.data "client-id" | b64dec }}{{ else }}{{ randAlphaNum 40 }}{{ end }}
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          issuer_mode: global
          grant_types: ["authorization_code", "refresh_token"]
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, tenant_id]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
      - model: authentik_core.application
        identifiers:
          slug: iverson-api
        attrs:
          name: iverson-api
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, iverson-oidc-default]]
      - model: authentik_brands.brand
        identifiers:
          domain: authentik-default
        attrs:
          branding_title: "Iverson"
          branding_custom_css: |
            :root, html[data-theme=dark] {
              --pf-global--primary-color--100: #006BB6;
              --pf-global--primary-color--200: #006BB6;
              --pf-global--primary-color--300: #006BB6;
              --pf-global--primary-color--dark-100: #006BB6;
              --pf-global--primary-color--light-100: #006BB6;
              --pf-global--secondary-color--100: #ED174C;
              --pf-global--BackgroundColor--100: #141414;
              --pf-global--BackgroundColor--light-100: #141414;
              --pf-global--BackgroundColor--dark-100: #141414;
              --ak-c-login__main--Color: #F5F5F5;
              --pf-global--Color--100: #F5F5F5;
              --ak-dark-background: #010101;
              --ak-dark-background-light: #0A0A0A;
              --ak-dark-background-lighter: #141414;
              --ak-font-family-sans-serif: 'Fraunces', serif;
              --ak-generic-display: 'Fraunces', serif;
            }
      - model: authentik_providers_oauth2.oauth2provider
        identifiers:
          name: iverson-loadtest-human
        attrs:
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          client_type: public
          redirect_uris:
            - matching_mode: strict
              url: "https://{{ .Values.global.ingressHost }}/placeholder-callback"
              redirect_uri_type: authorization
          client_id: {{ if $loadtestHuman }}{{ index $loadtestHuman.data "client-id" | b64dec }}{{ else }}{{ randAlphaNum 40 }}{{ end }}
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          issuer_mode: global
          grant_types: ["authorization_code", "refresh_token"]
          access_token_validity: "hours=2"
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, groups]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, tenant_id]]
      - model: authentik_core.application
        identifiers:
          slug: iverson-loadtest-human
        attrs:
          name: iverson-loadtest-human
          provider: !Find [authentik_providers_oauth2.oauth2provider, [name, iverson-loadtest-human]]
      - model: authentik_core.user
        identifiers:
          username: iverson-acting-user-smoke-test
        attrs:
          username: iverson-acting-user-smoke-test
          name: "Iverson Acting-User Smoke Test"
          email: iverson-acting-user-smoke-test@example.invalid
          password: {{ if $smokeTestUser }}{{ index $smokeTestUser.data "password" | b64dec }}{{ else }}{{ randAlphaNum 32 }}{{ end }}
          is_active: true
          attributes:
            tenant_id: "tenant-smoke-test"
      - model: authentik_core.group
        identifiers:
          name: iverson-loadtest-bypass
        attrs: {}
      - model: authentik_core.user
        identifiers:
          username: iverson-loadtest-bypass-user
        attrs:
          username: iverson-loadtest-bypass-user
          name: "Iverson LoadTest Bypass"
          email: iverson-loadtest-bypass-user@example.invalid
          password: {{ if $bypassUser }}{{ index $bypassUser.data "password" | b64dec }}{{ else }}{{ randAlphaNum 32 }}{{ end }}
          is_active: true
          attributes:
            tenant_id: "tenant-bypass"
          groups:
            - !Find [authentik_core.group, [name, iverson-loadtest-bypass]]
      - model: authentik_core.group
        identifiers:
          name: tenant-admins
        attrs: {}
      - model: authentik_core.user
        identifiers:
          username: iverson-admin-orchestrator
        attrs:
          username: iverson-admin-orchestrator
          name: "Iverson Admin Orchestrator"
          email: iverson-admin-orchestrator@example.invalid
          password: {{ if $adminOrchestratorUser }}{{ index $adminOrchestratorUser.data "password" | b64dec }}{{ else }}{{ randAlphaNum 32 }}{{ end }}
          is_active: true
          is_superuser: true
      - model: authentik_core.token
        identifiers:
          identifier: iverson-admin-orchestrator-token
        attrs:
          key: {{ if $adminOrchestratorToken }}{{ index $adminOrchestratorToken.data "token-key" | b64dec }}{{ else }}{{ randAlphaNum 50 }}{{ end }}
          user: !Find [authentik_core.user, [username, iverson-admin-orchestrator]]
          intent: api
