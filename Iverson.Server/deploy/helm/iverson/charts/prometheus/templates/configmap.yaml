apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
    scrape_configs:
      - job_name: iverson-api
        static_configs:
          - targets: ["{{ .Release.Name }}-api:8081"]
      - job_name: iverson-worker
        static_configs:
          - targets: ["{{ .Release.Name }}-worker:8081"]
