apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: {{ .Release.Name }}-kafka
  annotations:
    strimzi.io/kraft: enabled
    strimzi.io/node-pools: enabled
spec:
  kafka:
    # 3.8.0 is no longer supported by this pinned operator version (1.1.0) — only
    # 4.2.0/4.2.1/4.3.0 are (kafkaVersion.UnsupportedKafkaVersionException at reconcile).
    version: 4.3.0
    listeners:
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: scram-sha-512
    authorization:
      type: simple
    config:
      offsets.topic.replication.factor: {{ min .Values.replicas 3 }}
      transaction.state.log.replication.factor: {{ min .Values.replicas 3 }}
      transaction.state.log.min.isr: 1
      default.replication.factor: {{ min .Values.replicas 3 }}
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: {{ .Release.Name }}-kafka-pool
  labels:
    strimzi.io/cluster: {{ .Release.Name }}-kafka
spec:
  replicas: {{ .Values.replicas }}
  roles:
    - controller
    - broker
  resources:
    requests:
      cpu: {{ .Values.resources.requests.cpu | quote }}
      memory: {{ .Values.resources.requests.memory | quote }}
    limits:
      cpu: {{ .Values.resources.limits.cpu | quote }}
      memory: {{ .Values.resources.limits.memory | quote }}
  storage:
    type: persistent-claim
    size: {{ .Values.storageSize }}
    class: {{ .Values.storageClassName | quote }}
  template:
    pod:
      # KafkaNodePool's template.pod has no `nodeSelector` field (only `affinity`) —
      # a plain nodeSelector here is silently pruned by the API server, so cloud
      # profiles' `iverson.io/node-pool: kafka` constraint was never actually
      # applied. Express it as the equivalent required nodeAffinity instead.
      {{- if .Values.nodeSelector }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  {{- range $key, $value := .Values.nodeSelector }}
                  - key: {{ $key }}
                    operator: In
                    values: [{{ $value | quote }}]
                  {{- end }}
      {{- end }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
