apiVersion: kafka.strimzi.io/v1
kind: KafkaUser
metadata:
  name: {{ .Release.Name }}-api
  labels:
    strimzi.io/cluster: {{ .Release.Name }}-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    # This single principal is shared by both the `api` and `worker` Deployments (see
    # charts/worker) — its ACLs are prefix-scoped broadly enough (all `iverson.` topics,
    # all `iverson.consumer.*` groups) to cover both roles' needs without a separate
    # KafkaUser. Revisit this if either role ever needs a permission the other
    # shouldn't have (e.g. restricting `worker` to Read-only). Note: `worker` is not
    # read-only; ReconciliationQueueWorker runs a ~30s poll loop that calls
    # ReconciliationService.ProcessQueuedFailuresAsync, which produces to Kafka as part
    # of its normal retry/replay of queued outbox rows — this is routine work, not an
    # exception, and any future ACL restriction would need to account for it.
    acls:
      - resource: { type: topic, name: "iverson.", patternType: prefix }
        operations: ["Read", "Write", "Describe", "Create"]
      - resource: { type: group, name: "iverson.consumer", patternType: prefix }
        operations: ["Read"]
