apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-jaeger
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-jaeger
  annotations:
    # jaeger uses the `all-in-one` image, which is inherently single-instance —
    # not a real HA gap, a deliberate architectural choice.
    kube-score/ignore: deployment-replicas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-jaeger
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-jaeger
    spec:
      serviceAccountName: {{ .Release.Name }}-jaeger
      automountServiceAccountToken: false
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: jaeger
          image: "jaegertracing/all-in-one:{{ .Values.imageTag }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 14269
              name: admin
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
              ephemeral-storage: {{ index .Values.resources.requests "ephemeral-storage" | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              ephemeral-storage: {{ index .Values.resources.limits "ephemeral-storage" | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
