apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-starrocks-create-user
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-starrocks-create-user
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-starrocks-create-user
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: create-user
          image: "mysql:8.0"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: "100m", memory: "128Mi", ephemeral-storage: "256Mi" }
            limits: { cpu: "250m", memory: "256Mi", ephemeral-storage: "512Mi" }
          env:
            - name: ROOT_PW
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-starrocks-app, key: root-password } }
            - name: APP_PW
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-starrocks-app, key: app-password } }
          command: ["sh", "-c"]
          args:
            - |
              set -e
              FE_HOST="{{ .Release.Name }}-starrocks-fe-service"
              BE_REPLICAS="{{ .Values.be.replicas }}"
              until mysql -h "$FE_HOST" -P 9030 -u root -e "SELECT 1" >/dev/null 2>&1 \
                 || mysql -h "$FE_HOST" -P 9030 -u root -p"$ROOT_PW" -e "SELECT 1" >/dev/null 2>&1; do
                echo "waiting for FE..."; sleep 5
              done
              if mysql -h "$FE_HOST" -P 9030 -u root -p"$ROOT_PW" -e "SELECT 1" >/dev/null 2>&1; then
                AUTH="-p$ROOT_PW"
              else
                AUTH=""
              fi
              # BE's own entrypoint script registers itself with FE via
              # `mysql -u root` — hardcoded, no password, no way to configure — so changing
              # root's password (below) before every expected BE has joined permanently
              # locks any not-yet-joined BE out of the cluster (it only retries for ~15s
              # before giving up). Wait for BE_REPLICAS backends first, using the same $AUTH
              # so this is idempotent across upgrades where root already has a password.
              until [ "$(mysql -h "$FE_HOST" -P 9030 -u root $AUTH --skip-column-names --batch -e "SHOW BACKENDS;" 2>/dev/null | wc -l)" -ge "$BE_REPLICAS" ]; do
                echo "waiting for $BE_REPLICAS BE node(s) to register..."; sleep 5
              done
              mysql -h "$FE_HOST" -P 9030 -u root $AUTH -e "
                SET PASSWORD FOR 'root' = PASSWORD('$ROOT_PW');
                CREATE USER IF NOT EXISTS 'iverson_app'@'%' IDENTIFIED BY '$APP_PW';
                CREATE DATABASE IF NOT EXISTS iverson;
                GRANT SELECT, INSERT, UPDATE, DELETE ON iverson.* TO 'iverson_app'@'%';
                GRANT CREATE TABLE, DROP, ALTER ON DATABASE iverson TO 'iverson_app'@'%';
                GRANT OPERATE ON SYSTEM TO 'iverson_app'@'%';
                GRANT CREATE DATABASE ON CATALOG default_catalog TO 'iverson_app'@'%';
              "
              # StarRocks' GRANT dialect isn't MySQL's: DDL privileges (CREATE TABLE/DROP/ALTER)
              # are scoped ON DATABASE, not ON db.*, and CREATE must be written as the two-word
              # "CREATE TABLE" — a bare "CREATE" in the combined list used to fail with "No
              # viable statement", confirmed empirically against a live FE (4.1.1).
              # OPERATE ON SYSTEM is needed for `SHOW BACKENDS`, which
              # StarRocksRepository.IsHealthyAsync() runs as this user to back /health —
              # without it every readiness probe fails with "Access denied; you need (at
              # least one of) the OPERATE OR NODE privilege(s) on SYSTEM", confirmed
              # empirically against a live FE (4.1.1).
              # CREATE DATABASE ON CATALOG default_catalog is needed because
              # StarRocksRepository.EnsureDatabaseAsync() runs `CREATE DATABASE IF NOT
              # EXISTS iverson` as iverson_app on every RegisterSchema call — StarRocks
              # checks the privilege before checking whether the database already exists,
              # so this failed on literally every schema registration even though the
              # database this job already created was right there.
