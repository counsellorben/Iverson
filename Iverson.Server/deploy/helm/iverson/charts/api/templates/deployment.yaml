apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      serviceAccountName: {{ .Release.Name }}-api
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 8080
              name: grpc
          env:
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-app
                  key: uri
            - name: STARROCKS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-starrocks-app
                  key: app-password
            - name: ConnectionStrings__StarRocks
              value: "Server={{ .Release.Name }}-starrocks-fe-service;Port=9030;Database=iverson;User Id=iverson_app;Password=$(STARROCKS_APP_PASSWORD);AllowPublicKeyRetrieval=true;"
            - name: Qdrant__Host
              value: "{{ .Release.Name }}-qdrant"
            - name: Qdrant__Port
              value: "6334"
            - name: Kafka__BootstrapServers
              value: "{{ .Release.Name }}-kafka-kafka-bootstrap:9093"
            - name: Kafka__SecurityProtocol
              value: "SASL_SSL"
            - name: Kafka__SaslMechanism
              value: "SCRAM-SHA-512"
            - name: Kafka__SaslUsername
              value: "{{ .Release.Name }}-api"
            - name: Kafka__SaslPassword
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api
                  key: password
            - name: Kafka__SslCaLocation
              value: "/etc/kafka-ca/ca.crt"
            - name: Ollama__Host
              value: "http://{{ .Release.Name }}-ollama:11434"
            - name: Otel__Endpoint
              value: "http://{{ .Release.Name }}-jaeger:4317"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: kafka-ca
              mountPath: /etc/kafka-ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: kafka-ca
          secret:
            secretName: {{ .Release.Name }}-kafka-cluster-ca-cert
        - name: tmp
          emptyDir: {}
