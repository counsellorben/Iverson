apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  annotations:
    # kube-score's "Deployment has PodDisruptionBudget" check can never take its
    # <2-replicas skip path here (Spec.Replicas is always nil on this
    # HPA-controlled Deployment — see comment below), so it still reports
    # CRITICAL on values-local (hpa.minReplicas: 1, no PDB rendered) even though
    # a PDB would be a no-op at a true floor of 1. Harmless on values-aws/azure/gcp,
    # where a real PDB renders and this check passes anyway.
    kube-score/ignore: deployment-has-poddisruptionbudget
spec:
  # No static `replicas:` field here on purpose — this Deployment is HPA-controlled
  # (templates/hpa.yaml). Setting a static replica count on an HPA-targeted
  # Deployment causes Helm upgrades to reset the replica count to that static
  # value on every apply, fighting the autoscaler, and kube-score itself flags
  # that combination as CRITICAL ("Deployment targeted by HPA does not have
  # replicas configured"). One side effect: because `Spec.Replicas` is therefore
  # always nil, kube-score's "Deployment has PodDisruptionBudget" check can never
  # take the <2-replicas skip path it uses for StatefulSets with a static replica
  # count — so on the values-local overlay (hpa.minReplicas: 1, no PDB rendered
  # per templates/pdb.yaml's gate) that check still reports CRITICAL even though
  # a PDB would be a no-op at a true floor of 1. This is an inherent conflict
  # between kube-score's HPA-replicas check and its PDB check for any
  # HPA-controlled Deployment at minReplicas=1 — there is no single Deployment
  # shape that satisfies both checks simultaneously. Left as-is; see
  # helm-hardening-fix-report.md for the trade-off writeup.
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      serviceAccountName: {{ .Release.Name }}-api
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: {{ .Release.Name }}-api
                topologyKey: kubernetes.io/hostname
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 8081
              name: http
          env:
            - name: POSTGRES_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgres-app
                  key: password
            - name: ConnectionStrings__Postgres
              # CNPG's own `uri` secret key is a postgresql:// URI, which Npgsql's
              # connection-string parser rejects outright (it only accepts ADO.NET
              # key=value syntax, not libpq-style URIs) — composing it here mirrors the
              # ConnectionStrings__StarRocks pattern below.
              value: "Host={{ .Release.Name }}-postgres-rw;Port=5432;Database=iverson;Username=iverson;Password=$(POSTGRES_APP_PASSWORD)"
            - name: STARROCKS_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-starrocks-app
                  key: app-password
            - name: ConnectionStrings__StarRocks
              value: "Server={{ .Release.Name }}-starrocks-fe-service;Port=9030;Database=iverson;User Id=iverson_app;Password=$(STARROCKS_APP_PASSWORD);AllowPublicKeyRetrieval=true;"
            - name: QDRANT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-qdrant-api-key
                  key: api-key
            - name: Qdrant__ApiKey
              value: "$(QDRANT_API_KEY)"
            - name: Qdrant__Host
              value: "{{ .Release.Name }}-qdrant"
            - name: Qdrant__Port
              value: "6334"
            - name: Qdrant__CertPath
              value: "/etc/qdrant-tls/cert.pem"
            - name: Kafka__BootstrapServers
              value: "{{ .Release.Name }}-kafka-kafka-bootstrap:9093"
            - name: Kafka__SecurityProtocol
              value: "SASL_SSL"
            - name: Kafka__SaslMechanism
              value: "SCRAM-SHA-512"
            - name: Kafka__SaslUsername
              value: "{{ .Release.Name }}-api"
            - name: Kafka__SaslPassword
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-api
                  key: password
            - name: Kafka__SslCaLocation
              value: "/etc/kafka-ca/ca.crt"
            - name: Embeddings__BaseUrl
              value: "http://{{ .Release.Name }}-ollama:11434"
            - name: Otel__Endpoint
              value: "http://{{ .Release.Name }}-jaeger:4317"
            - name: Authentication__Authority
              value: "http://{{ .Release.Name }}-authentik:9000/application/o/iverson-api/"
            - name: Authentication__ExternalIssuer
              value: "http://authentik.{{ .Values.global.ingressHost }}/application/o/iverson-api/"
            - name: Authentication__ValidAudiences__0
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-human-oidc-client, key: client-id }
            - name: Authentication__ValidAudiences__1
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-loadtest-client, key: client-id }
            - name: Authentication__ValidAudiences__2
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-webtest-client, key: client-id }
            - name: Authentication__ValidAudiences__3
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-admin-automation-client, key: client-id }
            - name: Authentication__ActingUser__Authority
              value: "http://{{ .Release.Name }}-authentik:9000/application/o/iverson-api/"
            - name: Authentication__ActingUser__ValidAudiences__0
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-loadtest-human-client, key: client-id }
            - name: Authentik__BaseUrl
              value: "http://{{ .Release.Name }}-authentik:9000"
            - name: Authentik__AdminToken
              valueFrom:
                secretKeyRef: { name: {{ .Release.Name }}-authentik-admin-orchestrator-token, key: token-key }
            - name: Jaeger__OtlpHttpUrl
              value: "http://{{ .Release.Name }}-jaeger:4318"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
              ephemeral-storage: {{ index .Values.resources.requests "ephemeral-storage" | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
              ephemeral-storage: {{ index .Values.resources.limits "ephemeral-storage" | quote }}
          readinessProbe:
            httpGet:
              path: /health
              # 8080 is Http2-only (see appsettings.json's Kestrel:Endpoints:Grpc) — kubelet's
              # probe client speaks HTTP/1.1 and gets rejected with 400. 8081 is the dedicated
              # Http1 endpoint the same /health routes are also mapped to.
              port: 8081
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: kafka-ca
              mountPath: /etc/kafka-ca
              readOnly: true
            - name: qdrant-tls
              mountPath: /etc/qdrant-tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: kafka-ca
          secret:
            secretName: {{ .Release.Name }}-kafka-cluster-ca-cert
        - name: qdrant-tls
          secret:
            secretName: {{ .Release.Name }}-qdrant-tls
            items:
              - key: cert.pem
                path: cert.pem
        - name: tmp
          emptyDir: {}
