apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Release.Name }}-postgres
spec:
  instances: {{ .Values.instances }}
  enableSuperuserAccess: false   # least privilege — api never authenticates as `postgres`, only the app user below
  storage:
    size: {{ .Values.storageSize }}
    storageClass: {{ .Values.storageClassName | quote }}
  resources:
    requests:
      cpu: {{ .Values.resources.requests.cpu | quote }}
      memory: {{ .Values.resources.requests.memory | quote }}
    limits:
      cpu: {{ .Values.resources.limits.cpu | quote }}
      memory: {{ .Values.resources.limits.memory | quote }}
  affinity:
    nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 6 }}
    tolerations:
      {{- toYaml .Values.tolerations | nindent 6 }}
  bootstrap:
    initdb:
      database: iverson
      owner: iverson
  managed:
    roles:
      - name: authentik
        ensure: present
        login: true
        passwordSecret:
          name: {{ .Release.Name }}-authentik-postgres
  postgresql:
    parameters:
      max_connections: "200"
      # No explicit `ssl` parameter: CNPG's validating webhook now rejects it as a
      # "fixed configuration parameter" — CNPG always enables and manages TLS
      # (cert/key auto-generated and mounted) itself, unconditionally.
