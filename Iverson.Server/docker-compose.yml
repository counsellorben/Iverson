services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: iverson-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iverson
      POSTGRES_PASSWORD: iverson
      POSTGRES_DB: iverson
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init-authentik-db.sql:/docker-entrypoint-initdb.d/init-authentik-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iverson"]
      interval: 10s
      timeout: 5s
      retries: 5

  starrocks:
    image: starrocks/allin1-ubuntu:latest
    container_name: iverson-starrocks
    restart: unless-stopped
    ports:
      - "8030:8030"   # FE HTTP / admin
      - "9030:9030"   # FE MySQL query port
    volumes:
      - starrocks_data:/data/deploy
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -u root --connect-timeout=3 -e 'SELECT 1' 2>/dev/null || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: iverson-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: iverson-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: curlimages/curl:latest
    container_name: iverson-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    command: ["-X", "POST", "http://ollama:11434/api/pull", "-d", "{\"name\":\"nomic-embed-text\"}"]
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: iverson-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: iverson-kafka
    init: true
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 12
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Observability ────────────────────────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: iverson-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "4317:4317"    # OTLP gRPC (traces + logs)
      - "4318:4318"    # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:14269/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: iverson-prometheus
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Identity ────────────────────────────────────────────────────────────────

  redis:
    image: redis:7.4-alpine
    container_name: iverson-redis
    restart: unless-stopped
    command: ["redis-server", "--save", ""]   # cache-only, no volume mounted — matches the Helm
                                               # subchart's identical reasoning (Task 1)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.5.3
    container_name: iverson-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: "dev-only-not-for-production-use-0123456789abcdef"
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@iverson.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: dev-admin-password
      AUTHENTIK_BOOTSTRAP_TOKEN: dev-bootstrap-token-0123456789
    ports:
      - "9000:9000"
    volumes:
      - ./deploy/helm/iverson/charts/authentik/blueprints:/blueprints/custom:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.5.3
    container_name: iverson-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: "dev-only-not-for-production-use-0123456789abcdef"
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: admin@iverson.local
      AUTHENTIK_BOOTSTRAP_PASSWORD: dev-admin-password
      AUTHENTIK_BOOTSTRAP_TOKEN: dev-bootstrap-token-0123456789
    volumes:
      - ./deploy/helm/iverson/charts/authentik/blueprints:/blueprints/custom:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Application ─────────────────────────────────────────────────────────────

  iverson-api:
    build:
      context: ..
      dockerfile: Iverson.Server/Iverson.Api/Dockerfile
    image: iverson-api
    container_name: iverson-api
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Otel__Endpoint=http://jaeger:4317
      - Embeddings__BaseUrl=http://ollama:11434
      - Embeddings__ModelId=nomic-embed-text
      - Kafka__BootstrapServers=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      starrocks:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  starrocks_data:
  qdrant_data:
  zookeeper_data:
  zookeeper_logs:
  kafka_data:
  ollama_data:
  prometheus_data:
